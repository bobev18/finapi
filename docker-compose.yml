version: '3.8'

services:
  # NOTE: service_b uses SQLite as its cache store.  SQLite serialises all
  # writes at the file level, so the service MUST run with a single uvicorn
  # worker (the default).  Adding ``--workers N`` (N > 1) to the command, or
  # running multiple replicas that share the same database volume, will cause
  # intermittent "database is locked" errors under concurrent write load.
  # To scale beyond a single worker, replace SQLite with PostgreSQL by
  # changing DATABASE_URL and adding the psycopg2/asyncpg driver dependency.
  service_b:
    build:
      context: .
      dockerfile: service_b/Dockerfile
    container_name: service_b
    ports:
      - "${PORT_SERVICE_B:-8001}:${PORT_SERVICE_B:-8001}"
    environment:
      - PORT=${PORT_SERVICE_B:-8001}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-test_internal_key}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - DATABASE_URL=sqlite:////app/data/market_cache.db
      - PRIMARY_PROVIDER=${PRIMARY_PROVIDER:-yfinance}
      - FALLBACK_PROVIDER=${FALLBACK_PROVIDER:-none}
      - EODHD_API_KEY=${EODHD_API_KEY:-}
    volumes:
      - cache_data:/app/data

  service_c:
    build:
      context: .
      dockerfile: service_c/Dockerfile
    container_name: service_c
    ports:
      - "${PORT_SERVICE_C:-8002}:${PORT_SERVICE_C:-8002}"
    environment:
      - PORT=${PORT_SERVICE_C:-8002}
      - SIGNAL_API_KEY=${SIGNAL_API_KEY:-test_signal_key}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-test_internal_key}
      - SERVICE_B_URL=http://service_b:${PORT_SERVICE_B:-8001}
    depends_on:
      - service_b

  service_a:
    build:
      context: .
      dockerfile: service_a/Dockerfile
    container_name: service_a
    ports:
      - "${PORT_SERVICE_A:-8000}:${PORT_SERVICE_A:-8000}"
    environment:
      - PORT=${PORT_SERVICE_A:-8000}
      - CLIENT_API_KEY=${CLIENT_API_KEY:-test_client_key}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-test_internal_key}
      - SERVICE_B_URL=http://service_b:${PORT_SERVICE_B:-8001}
      - SERVICE_C_URL=http://service_c:${PORT_SERVICE_C:-8002}
      - SIGNAL_API_KEY=${SIGNAL_API_KEY:-test_signal_key}
    depends_on:
      - service_b
      - service_c

volumes:
  cache_data:
